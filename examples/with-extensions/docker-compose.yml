# Multi-tenant example — extensions enabled for scoping by clientUID and projectId
#
# Usage:
#   cd examples/with-extensions
#   docker compose up
#
# Then make requests with headers:
#   curl -H "x-client-uid: tenant-1" -H "x-project-id: proj-1" http://localhost:3100/api/v1/examples

services:
  module:
    build: ../../
    ports:
      - "3100:3100"
    volumes:
      - ./config.yml:/app/config.yml:ro
    environment:
      - MODULE_API_KEY=demo-key-123
    depends_on:
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:7
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo-data:
